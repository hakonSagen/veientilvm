services:
  - type: web
    runtime: static
    name: sorloths-vm-reise
    plan: free
    buildCommand: "echo 'Static site ready'"
    staticPublishPath: ./
    previews:
      generation: automatic
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=300
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
